site_name: Datos Abiertos MX
site_description: Catálogo de fuentes de datos abiertos del gobierno mexicano
site_url: https://pamela-ruiz9.github.io/datos-abiertos-mx/
repo_url: https://github.com/Pamela-ruiz9/datos-abiertos-mx
repo_name: Pamela-ruiz9/datos-abiertos-mx

docs_dir: _mkdocs_src
site_dir: site

theme:
  name: material
  language: es
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Cambiar a modo claro
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo oscuro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips
    - toc.follow

extra_css:
  - assets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Catálogo:
    - Finanzas:
      - Banxico SIE: catalogo/finanzas/banxico-sie.md
      - CNBV Portafolio: catalogo/finanzas/cnbv-portafolio.md
    - Economía:
      - ENOE Empleo: catalogo/economia/enoe-empleo.md
      - SHCP Presupuesto: catalogo/economia/shcp-transparencia-presupuestaria.md
      - SAT Estadísticas Fiscales: catalogo/economia/sat-estadisticas-fiscales.md
    - Demografía:
      - INEGI: catalogo/demografia/inegi.md
      - CONAPO Proyecciones: catalogo/demografia/conapo-proyecciones.md
    - Salud:
      - SSA/DGE Epidemiológicos: catalogo/salud/ssa-dge-datos-epidemiologicos.md
      - IMSS Estadísticas: catalogo/salud/imss-estadisticas.md
    - Educación:
      - SEP Estadísticas: catalogo/educacion/sep-estadisticas.md
      - MEJOREDU: catalogo/educacion/mejoredu.md
    - Seguridad:
      - SESNSP Incidencia Delictiva: catalogo/seguridad/sesnsp-incidencia-delictiva.md
    - Medio Ambiente:
      - SINAICA Calidad del Aire: catalogo/medio-ambiente/sinaica-calidad-aire.md
      - SEMARNAT: catalogo/medio-ambiente/semarnat-datos-abiertos.md
    - Ciencia y Tecnología:
      - CONACYT Indicadores: catalogo/ciencia-tecnologia/conacyt-indicadores-id.md
  - Portales:
    - Banxico: portales/banxico.md
    - CNBV: portales/cnbv.md
    - DataMexico: portales/datamexico.md
    - datos.gob.mx: portales/datos-gob-mx.md
    - INEGI: portales/inegi.md
    - SESNSP: portales/sesnsp.md
    - SHCP: portales/shcp.md
  - Herramientas:
    - Python: herramientas/python.md
    - R: herramientas/r.md
  - Contribuir:
    - Guía: CONTRIBUTING.md
    - Schema: docs/schema.md
