name: Deploy explorador (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'catalogo/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar sitio estático
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r catalogo _site/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
